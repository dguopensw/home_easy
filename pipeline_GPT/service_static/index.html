<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가구 치수 측정 서비스</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #FF6F00;
      --brand-light: #FFF3E0;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
      --bg: #f8f8f8;
      --card: #ffffff;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --success: #2e7d32;
      --warning: #e65100;
      --info: #1565c0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .logo { font-size: 20px; font-weight: 700; color: var(--brand); }
    header .subtitle { font-size: 13px; color: var(--text-muted); }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    /* --- Card --- */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 16px;
    }

    /* --- URL Input --- */
    .input-row { display: flex; gap: 10px; }
    .input-row input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .input-row input:focus { border-color: var(--brand); }
    .btn {
      padding: 11px 22px;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-secondary { background: var(--brand-light); color: var(--brand); }

    /* --- Image Grid --- */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .img-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      background: #eee;
      aspect-ratio: 1;
    }
    .img-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-card.selected { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(255,111,0,.2); }
    .img-card .badge {
      position: absolute; top: 6px; left: 6px;
      background: var(--brand); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
    }
    .img-card .rank-badge {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.55); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 20px;
    }

    /* --- Process Button Row --- */
    .process-row { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
    .selected-label { font-size: 13px; color: var(--text-muted); }

    /* --- Loading --- */
    .loading-wrap { text-align: center; padding: 40px 0; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { color: var(--text-muted); font-size: 14px; }

    /* --- Result Images --- */
    .result-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .result-img-card { border-radius: 10px; overflow: hidden; background: #f0f0f0; }
    .result-img-card img {
      width: 100%; aspect-ratio: 1;
      object-fit: contain; display: block; background: #f8f8f8;
    }
    .result-img-label {
      font-size: 12px; color: var(--text-muted);
      padding: 6px 10px;
      background: var(--card); border-top: 1px solid var(--border);
    }

    /* --- Info Rows --- */
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: var(--text-muted); }
    .info-value { font-size: 14px; font-weight: 600; }

    /* --- Badges --- */
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .badge-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
    }
    .badge-ok { background: #e8f5e9; color: var(--success); }
    .badge-warn { background: #fff3e0; color: var(--warning); }
    .badge-info { background: #e3f2fd; color: var(--info); }
    .badge-na { background: #f5f5f5; color: #999; }

    /* --- Dimensions Table --- */
    .dim-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin: 12px 0;
    }
    .dim-cell {
      text-align: center;
      background: var(--brand-light);
      border-radius: 8px;
      padding: 16px 12px;
    }
    .dim-cell .dim-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .dim-cell .dim-val { font-size: 24px; font-weight: 700; color: var(--brand); }
    .dim-cell .dim-unit { font-size: 12px; color: var(--text-muted); }

    /* --- Warnings --- */
    .warnings-list { margin-top: 10px; }
    .warning-item {
      font-size: 12px; color: var(--warning);
      padding: 3px 0; display: flex; align-items: center; gap: 5px;
    }

    /* --- Debug --- */
    details { margin-top: 8px; }
    summary {
      cursor: pointer; font-size: 13px; color: var(--info);
      padding: 8px 0; user-select: none;
    }
    pre {
      background: #f5f5f5; border-radius: 8px;
      padding: 14px; font-size: 12px;
      overflow-x: auto; margin-top: 8px;
      max-height: 320px; overflow-y: auto;
    }

    /* --- Obstacle section --- */
    .obstacle-box {
      border: 1.5px solid #FFE0B2;
      background: #FFF8F0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .obstacle-box h4 { font-size: 14px; color: var(--warning); margin-bottom: 6px; }
    .obstacle-item { font-size: 13px; color: var(--text); padding: 4px 0; }

    /* --- Error --- */
    .error-box {
      background: #ffebee; border: 1px solid #ef9a9a;
      border-radius: 10px; padding: 16px;
      color: #b71c1c; font-size: 14px;
    }

    /* --- Sections hidden by default --- */
    .hidden { display: none; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">가구 치수 측정</div>
    <div class="subtitle">당근마켓 · 중고나라 상품 URL로 가구 치수를 자동 추정합니다</div>
  </div>
</header>

<div class="container">

  <!-- URL Input -->
  <div class="card">
    <div class="card-title">URL 입력</div>
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="당근마켓 또는 중고나라 상품 URL을 붙여넣으세요" />
      <button class="btn btn-primary" id="scrapeBtn">스크래핑</button>
    </div>
  </div>

  <!-- Scraping loading -->
  <div id="scrapeLoading" class="card hidden">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-label">상품 정보를 가져오는 중...</div>
    </div>
  </div>

  <!-- Scrape error -->
  <div id="scrapeError" class="card hidden">
    <div class="error-box" id="scrapeErrorMsg"></div>
  </div>

  <!-- Scrape results -->
  <div id="scrapeResults" class="card hidden">
    <div class="card-title">상품 정보</div>
    <div class="info-row">
      <span class="info-label">제목</span>
      <span class="info-value" id="productTitle"></span>
    </div>
    <div class="info-row">
      <span class="info-label">가격</span>
      <span class="info-value" id="productPrice"></span>
    </div>
    <div class="info-row">
      <span class="info-label">가구 종류 추정</span>
      <span class="info-value" id="furnitureGuess"></span>
    </div>
    <div class="info-row" id="listingDimRow" style="display:none">
      <span class="info-label">판매글 치수</span>
      <span class="info-value" id="listingDims"></span>
    </div>
    <div style="margin-top:10px; font-size:13px; color:var(--text-muted)" id="productDesc"></div>

    <div style="margin-top:20px;">
      <div class="card-title">이미지 선택</div>
      <div style="font-size:13px; color:var(--text-muted); margin-bottom:10px;">
        AI 추천 이미지가 강조 표시됩니다. 다른 이미지를 클릭해 선택을 바꿀 수 있습니다.
      </div>
      <div class="image-grid" id="imageGrid"></div>
    </div>

    <div class="process-row">
      <button class="btn btn-primary" id="processBtn">이 이미지로 처리하기</button>
      <span class="selected-label" id="selectedLabel"></span>
    </div>
  </div>

  <!-- Processing loading -->
  <div id="processLoading" class="card hidden">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-label" id="processLoadingLabel">파이프라인 실행 중...</div>
    </div>
  </div>

  <!-- Process error -->
  <div id="processError" class="card hidden">
    <div class="error-box" id="processErrorMsg"></div>
  </div>

  <!-- Results -->
  <div id="results" class="hidden">

    <!-- Result images -->
    <div class="card">
      <div class="card-title">처리 결과 이미지</div>
      <div class="result-images" id="resultImages"></div>
    </div>

    <!-- Furniture & Detection -->
    <div class="card">
      <div class="card-title">가구 분석</div>
      <div class="info-row">
        <span class="info-label">가구 종류</span>
        <span class="info-value" id="resFurnitureType"></span>
      </div>
      <div class="info-row">
        <span class="info-label">판단 근거</span>
        <span class="info-value" id="resFurnitureSource"></span>
      </div>
      <div class="info-row">
        <span class="info-label">마스킹 전략</span>
        <span class="info-value" id="resMaskingStrategy"></span>
      </div>
    </div>

    <!-- Obstacle -->
    <div class="card" id="obstacleCard">
      <div class="card-title">장애물 분석</div>
      <div id="obstacleContent"></div>
    </div>

    <!-- Dimensions -->
    <div class="card">
      <div class="card-title">치수 결과</div>
      <div class="dim-grid" id="dimGrid"></div>
      <div class="info-row">
        <span class="info-label">추정 방법</span>
        <span class="info-value" id="dimSource"></span>
      </div>
      <div class="info-row">
        <span class="info-label">신뢰도</span>
        <span class="info-value" id="dimConfidence"></span>
      </div>
    </div>

    <!-- Final Decision -->
    <div class="card">
      <div class="card-title">최종 상태</div>
      <div class="badge-row" id="decisionBadges"></div>
      <div class="warnings-list" id="warningsList"></div>
    </div>

    <!-- Debug (collapsible) -->
    <div class="card">
      <details>
        <summary>디버그 정보 (펼치기)</summary>
        <pre id="debugJson"></pre>
      </details>
    </div>

  </div><!-- /results -->

</div><!-- /container -->

<script>
  const API = '';
  let scrapeData = null;
  let selectedImageIndex = 0;
  let jobId = null;

  const $ = id => document.getElementById(id);
  const show = id => $(id).classList.remove('hidden');
  const hide = id => $(id).classList.add('hidden');

  // ── Scrape ──────────────────────────────────────────────────────────────

  $('scrapeBtn').addEventListener('click', doScrape);
  $('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') doScrape(); });

  async function doScrape() {
    const url = $('urlInput').value.trim();
    if (!url) { alert('URL을 입력해주세요.'); return; }

    hide('scrapeError');
    hide('scrapeResults');
    hide('processLoading');
    hide('processError');
    hide('results');
    show('scrapeLoading');
    $('scrapeBtn').disabled = true;

    try {
      const resp = await fetch(`${API}/api/scrape`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || data.error || '스크래핑 실패');
      scrapeData = data;
      renderScrapeResults(data);
    } catch (err) {
      $('scrapeErrorMsg').textContent = `오류: ${err.message}`;
      show('scrapeError');
    } finally {
      hide('scrapeLoading');
      $('scrapeBtn').disabled = false;
    }
  }

  function renderScrapeResults(data) {
    $('productTitle').textContent = data.title || '(제목 없음)';
    $('productPrice').textContent = data.price || '-';
    $('furnitureGuess').textContent =
      data.furniture_guess
        ? `${data.furniture_guess.type} (${data.furniture_guess.confidence})`
        : '-';

    const desc = data.description || '';
    $('productDesc').textContent = desc.length > 200 ? desc.slice(0, 200) + '...' : desc;

    const ld = data.dimensions_from_listing;
    if (ld && ld.width_cm) {
      $('listingDims').textContent =
        `가로 ${ld.width_cm}cm × 세로 ${ld.depth_cm ?? '?'}cm × 높이 ${ld.height_cm ?? '?'}cm`;
      $('listingDimRow').style.display = 'flex';
    } else {
      $('listingDimRow').style.display = 'none';
    }

    // Image grid
    const grid = $('imageGrid');
    grid.innerHTML = '';
    const recommended = data.ai_recommended_image_index ?? 0;
    selectedImageIndex = recommended;

    (data.image_urls || []).forEach((url, i) => {
      const card = document.createElement('div');
      card.className = 'img-card' + (i === recommended ? ' selected' : '');
      card.dataset.index = i;

      const img = document.createElement('img');
      img.src = url;
      img.alt = `Image ${i}`;
      img.loading = 'lazy';
      card.appendChild(img);

      if (i === recommended) {
        const b = document.createElement('div');
        b.className = 'badge';
        b.textContent = 'AI 추천';
        card.appendChild(b);
      }

      const ranked = data.ranked_candidate_indices || [];
      const rank = ranked.indexOf(i);
      if (rank >= 0) {
        const rb = document.createElement('div');
        rb.className = 'rank-badge';
        rb.textContent = `#${rank + 1}`;
        card.appendChild(rb);
      }

      card.addEventListener('click', () => selectImage(i));
      grid.appendChild(card);
    });

    updateSelectedLabel();
    show('scrapeResults');
  }

  function selectImage(idx) {
    selectedImageIndex = idx;
    document.querySelectorAll('.img-card').forEach(c => {
      c.classList.toggle('selected', parseInt(c.dataset.index) === idx);
    });
    updateSelectedLabel();
  }

  function updateSelectedLabel() {
    $('selectedLabel').textContent = `선택된 이미지: #${selectedImageIndex}`;
  }

  // ── Process ─────────────────────────────────────────────────────────────

  $('processBtn').addEventListener('click', doProcess);

  async function doProcess() {
    const url = $('urlInput').value.trim();
    if (!url) return;

    hide('processError');
    hide('results');
    show('processLoading');
    $('processBtn').disabled = true;

    const stages = [
      '가구 종류 판단 중...',
      'SAM3 마스크 생성 중...',
      '장애물 분석 중...',
      '누끼 정제 중...',
      '치수 추정 중...',
    ];
    let stageIdx = 0;
    const stageTimer = setInterval(() => {
      stageIdx = (stageIdx + 1) % stages.length;
      $('processLoadingLabel').textContent = stages[stageIdx];
    }, 4000);

    try {
      const resp = await fetch(`${API}/api/process`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, selected_image_index: selectedImageIndex }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || data.error || '처리 실패');
      jobId = data.job_id;
      renderResults(data);
      show('results');
    } catch (err) {
      $('processErrorMsg').textContent = `오류: ${err.message}`;
      show('processError');
    } finally {
      clearInterval(stageTimer);
      hide('processLoading');
      $('processBtn').disabled = false;
    }
  }

  // ── Render Results ──────────────────────────────────────────────────────

  function imgUrl(jid, filename) {
    return filename ? `${API}/api/output/${jid}/${filename}` : null;
  }

  function renderResults(data) {
    const jid = data.job_id;
    const files = data.files || {};

    // --- Result images ---
    const imagesEl = $('resultImages');
    imagesEl.innerHTML = '';
    const imageSlots = [
      { key: 'original',         label: '원본 이미지' },
      { key: 'measurement',      label: '측정용 이미지 (원본 기준)' },
      { key: 'final_cutout',     label: '최종 누끼' },
      { key: 'obstacle_mask',    label: '장애물 마스크' },
      { key: 'obstacle_removed', label: '장애물 제거 이미지' },
      { key: 'generation_cutout', label: '생성용 누끼 (3D/AR)' },
    ];
    imageSlots.forEach(({ key, label }) => {
      const filename = files[key];
      if (!filename) return;
      const card = document.createElement('div');
      card.className = 'result-img-card';
      card.innerHTML = `
        <img src="${imgUrl(jid, filename)}" alt="${label}" loading="lazy" />
        <div class="result-img-label">${label}</div>
      `;
      imagesEl.appendChild(card);
    });

    // --- Furniture info ---
    const furn = data.furniture || {};
    $('resFurnitureType').textContent =
      `${furn.type || '-'} (${furn.type_confidence || '-'})`;
    $('resFurnitureSource').textContent = furn.type_source || '-';

    const ms = data.masking_strategy || {};
    const msFamily = ms.family || '-';
    const msSubtype = ms.category_subtype || '';
    const msMethod = ms.strategy || ms.primary || '-';
    $('resMaskingStrategy').textContent =
      `${msFamily}${msSubtype && msSubtype !== 'generic' ? ' / ' + msSubtype : ''} (${msMethod})`;

    // --- Obstacle ---
    const obs = data.obstacle_analysis || {};
    const obsEl = $('obstacleContent');
    if (obs.has_major_obstacle) {
      let html = `<div class="obstacle-box">
        <h4>큰 장애물 감지됨</h4>
        <div class="obstacle-item">${obs.obstacle_summary || ''}</div>`;
      (obs.obstacles || []).forEach(o => {
        html += `<div class="obstacle-item">• <strong>${o.name}</strong>: ${o.description} (${o.location})</div>`;
      });
      html += `<div style="font-size:12px;color:var(--text-muted);margin-top:8px">${obs.reason || ''}</div>`;
      html += '</div>';
      if (data.final_decision?.inpainting_used) {
        html += '<div class="badge-status badge-info" style="display:inline-flex">LaMa 인페인팅 완료 → 생성용 이미지 사용</div>';
      } else {
        html += '<div class="badge-status badge-warn" style="display:inline-flex">인페인팅 실패 → 원본으로 대체</div>';
      }
      obsEl.innerHTML = html;
    } else {
      obsEl.innerHTML = `<div class="badge-status badge-ok">장애물 없음 — ${obs.reason || '깨끗한 이미지'}</div>`;
    }

    // --- Dimensions ---
    const dims = data.dimensions || {};
    const dimGrid = $('dimGrid');
    dimGrid.innerHTML = '';
    [
      { label: '가로 (Width)', val: dims.width_cm },
      { label: '세로 (Depth)', val: dims.depth_cm },
      { label: '높이 (Height)', val: dims.height_cm },
    ].forEach(({ label, val }) => {
      const cell = document.createElement('div');
      cell.className = 'dim-cell';
      cell.innerHTML = `
        <div class="dim-label">${label}</div>
        <div class="dim-val">${val != null ? val : '—'}</div>
        <div class="dim-unit">cm</div>
      `;
      dimGrid.appendChild(cell);
    });

    const srcMap = { listing_text: '판매글 텍스트', vision_estimate: 'GPT Vision 추정', local_category_fallback: '카테고리 기본값' };
    let dimSourceText = srcMap[dims.source] || dims.source || '-';
    if (dims.source === 'listing_text' && dims.approximate) dimSourceText = '판매글 기준(약) — 사용자 확인 필요';
    $('dimSource').textContent = dimSourceText;
    $('dimConfidence').textContent = dims.confidence || '-';

    // --- Final Decision ---
    const fd = data.final_decision || {};
    const badgeEl = $('decisionBadges');
    badgeEl.innerHTML = '';

    // 치수 상태
    const scaleStatusMap = {
      verified_from_listing:                      '판매글 치수',
      listing_approx_needs_user_confirmation:     '판매글 기준(약) — 사용자 확인 필요',
      estimated_needs_user_confirmation:          'AI 추정 — 사용자 확인 필요',
      low_confidence_blocked:                     '신뢰도 낮음 — AR 사용 불가',
    };
    const scaleLabel = scaleStatusMap[fd.scale_status] || fd.scale_status || '-';
    const scaleClass = fd.can_use_for_ar_scale ? 'badge-ok' : (fd.needs_user_confirmation ? 'badge-warn' : 'badge-na');
    const scaleSpan = document.createElement('span');
    scaleSpan.className = `badge-status ${scaleClass}`;
    scaleSpan.textContent = `치수: ${scaleLabel}`;
    badgeEl.appendChild(scaleSpan);

    // 3D 생성 상태
    const genLabel = fd.can_use_for_3d_generation
      ? (fd.needs_review_for_3d_generation ? '3D 생성: 검토 필요' : '3D 생성: 사용 가능')
      : '3D 생성: 사용 비추천';
    const genClass = fd.can_use_for_3d_generation
      ? (fd.needs_review_for_3d_generation ? 'badge-warn' : 'badge-ok')
      : 'badge-na';
    const genSpan = document.createElement('span');
    genSpan.className = `badge-status ${genClass}`;
    genSpan.textContent = genLabel;
    badgeEl.appendChild(genSpan);

    // 치수 사용 가능 배지
    const dimSpan = document.createElement('span');
    dimSpan.className = `badge-status ${fd.can_use_for_dimension ? 'badge-ok' : 'badge-warn'}`;
    dimSpan.textContent = `${fd.can_use_for_dimension ? '✓' : '✗'} 치수 추정 가능`;
    badgeEl.appendChild(dimSpan);

    const confSpan = document.createElement('span');
    const confClass = { high: 'badge-ok', medium: 'badge-info', low: 'badge-warn' }[fd.confidence_level] || 'badge-na';
    confSpan.className = `badge-status ${confClass}`;
    confSpan.textContent = `신뢰도: ${fd.confidence_level || '-'}`;
    badgeEl.appendChild(confSpan);

    // Detection / Cutout quality 경고
    const dq = data.detection_quality || {};
    const cq = data.cutout_quality || {};
    const qualityWarnings = [
      ...(dq.warnings || []).map(w => `[bbox] ${w}`),
      ...(cq.warnings || []).map(w => `[cutout] ${w}`),
      ...((data.generation_contaminant_analysis?.contaminants || []).map(
        c => `[소품] ${c.name} — ${c.location || c.description}`
      )),
    ];
    if (qualityWarnings.length) {
      const qDiv = document.createElement('div');
      qDiv.style.cssText = 'margin-top:8px;font-size:12px;color:var(--text-muted)';
      qDiv.innerHTML = qualityWarnings.map(w => `<div>⚠ ${w}</div>`).join('');
      badgeEl.appendChild(qDiv);
    }

    // Warnings
    const warnEl = $('warningsList');
    warnEl.innerHTML = '';
    (fd.warnings || []).forEach(w => {
      const div = document.createElement('div');
      div.className = 'warning-item';
      div.textContent = `⚠ ${w}`;
      warnEl.appendChild(div);
    });

    // Debug JSON
    $('debugJson').textContent = JSON.stringify({
      furniture: data.furniture,
      target_detection: data.target_detection,
      detection_quality: data.detection_quality,
      obstacle_analysis: data.obstacle_analysis,
      generation_contaminant_analysis: data.generation_contaminant_analysis,
      dimensions: data.dimensions,
      cutout_quality: data.cutout_quality,
      generation_cutout_quality: data.generation_cutout_quality,
      final_decision: data.final_decision,
      debug: data.debug,
    }, null, 2);
  }
</script>
</body>
</html>
